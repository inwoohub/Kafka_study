services:
  # zookeeper: 카프카 브로커를 관리
  # 최근 카프카는 주키퍼가 없어도 돌아가지만, 학습할 때는 주키퍼가 안정적
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181      # 클라이언트가 붙을 포트
      ZOOKEEPER_TICK_TIME: 2000        # 하트비트 주기 (ms)

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1          # 브로커 1개니까 복제본 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1  # ↑
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1             # ↑
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"            # 토픽 자동 생성

# 접속 시도 (Handshake): 스프링 앱이 localhost:9092로 접속
# 정보 확인 (Metadata): "나 로그 보내고 싶은데, 누구한테 보내면 돼?"
# 카프카 대답: "나는 localhost:9092야!" ← KAFKA_ADVERTISED_LISTENERS가 이걸 알려줌